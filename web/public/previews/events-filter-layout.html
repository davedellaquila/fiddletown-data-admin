<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events Filter Layout Preview</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f1ea;
      color: #172033;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f4f1ea;
    }

    #events-list {
      min-height: 100vh;
    }

    @media (min-width: 960px) {
      #events-list .ssa-date-inputs-row {
        display: grid !important;
        grid-template-columns: minmax(0, 1fr) 72px minmax(0, 1fr) 82px !important;
        gap: 0 !important;
      }

      #events-list .ssa-date-inputs-row label:first-of-type {
        grid-column: 1 !important;
      }

      #events-list .ssa-date-inputs-row label:nth-of-type(2) {
        grid-column: 3 !important;
        padding-right: 0 !important;
      }

      #events-list .ssa-date-clear-btn {
        grid-column: 4 !important;
        width: 44px !important;
        min-width: 44px !important;
        justify-self: center !important;
      }
    }
  </style>
</head>
<body>
  <div id="events-list"></div>

  <script src="./events-filter-layout.js?v=dark-calendar-event-bg"></script>
  <script>

</body>
</html>
